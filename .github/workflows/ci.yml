name: CI

on:
  pull_request:
  push:
    branches: [main, fnd-002-ci-gate]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Prisma reads this at build time — generateStaticParams queries the SQLite DB.
      DATABASE_URL: file:./prisma/dev.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The Prisma client (src/generated/prisma) is gitignored — regenerate it.
      - run: npx prisma generate
      # Create the schema in a fresh SQLite DB and seed it so the static build
      # has data to render (mirrors local `npm run build`).
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      # Next 16 emits PageProps/LayoutProps/RouteContext into .next/types only on
      # `next dev`, `next build`, or `next typegen`. tsc --noEmit (inside
      # `npm run check`) needs these — generate them before the check step.
      - run: npx next typegen
      - run: npm run check
      - run: npm run build
